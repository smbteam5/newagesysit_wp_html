<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transparent Video - Safari</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        /* Example gradient background to prove transparency works */
        background: linear-gradient(
          135deg,
          #0a0a2e 0%,
          #1a1a5e 50%,
          #0a0a2e 100%
        );
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .transparent-video-container {
        position: relative;
        width: 556px;
        max-width: 100%;
      }

      .transparent-video-container video {
        display: block;
        width: 100%;
        height: auto;
        /* No background color - critical for transparency */
        background: transparent;
      }
    </style>
  </head>
  <body>
    <div class="transparent-video-container">
      <video autoplay muted loop playsinline>
        <source
          src="./img/output_safari.mov"
          type='video/quicktime; codecs="hvc1"'
        />
        <source src="./img/home-new/bg-new.webm" type="video/webm" />
      </video>
    </div>
  </body>
</html>
